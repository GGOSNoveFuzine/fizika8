<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>3D Mrki - Shadow Master</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none; 
            user-select: none;
            text-shadow: 0 0 5px black;
            z-index: 10;
        }
        h1 { margin: 0; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; }
        p { color: #94a3b8; margin-top: 5px; max-width: 400px; line-height: 1.4; }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(15, 23, 42, 0.9);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #334155;
            pointer-events: auto;
            flex-wrap: wrap; 
            justify-content: center;
            z-index: 20;
        }

        button {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #475569;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            white-space: nowrap;
        }
        button:hover { background: #38bdf8; color: #000; }
        
        button#btnPause.paused {
            background: #fbbf24;
            color: #000;
            border-color: #f59e0b;
        }

        .toggle-group { display: flex; align-items: center; gap: 8px; color: #cbd5e1; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #38bdf8; }

        #eclipseStatus {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            font-weight: bold;
            font-size: 1.4rem;
            color: #4ade80;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        .timer-bar {
            height: 4px;
            background: #4ade80;
            width: 0%;
            position: absolute;
            bottom: -10px;
            right: 0;
            transition: width 0.1s linear;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui">
        <h1>Lovilec Mrkov (3D)</h1>
        <p>
            Opazuj tirnico Lune. Sistem bo ustavil čas le, ko je senca <b>jasno vidna</b> na Zemlji.<br>
            Za najboljši pogled na senco uporabi gumb "Z Zemlje" ali "Zgoraj".
        </p>
    </div>

    <div id="eclipseStatus">
        NI MRKA
        <div class="timer-bar" id="timerBar"></div>
    </div>

    <div id="controls">
        <button id="btnPause">⏸ PAVZA</button>
        
        <div class="toggle-group">
            <input type="checkbox" id="autoPauseCheck" checked>
            <label for="autoPauseCheck">Pavza ob dogodku (5s)</label>
        </div>

        <div style="width: 1px; height: 30px; background: #475569;"></div>

        <div class="toggle-group">
            <input type="checkbox" id="tiltCheck" checked>
            <label for="tiltCheck">Naklon (5°)</label>
        </div>

        <div style="width: 1px; height: 30px; background: #475569;"></div>
        
        <button id="btnTop">Zgoraj</button>
        <button id="btnSide">S Strani</button>
        <button id="btnEarth">Z Zemlje</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; 
        // Uporabimo PCFSoft za mehke robove, ampak z visoko resolucijo
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- OBJEKTI ---
        
        // 1. SONCE (Močan vir svetlobe)
        const sunLight = new THREE.DirectionalLight(0xffffff, 3.0); // Povečana jakost
        sunLight.position.set(-100, 0, 0); 
        sunLight.castShadow = true;
        
        // OPTIMIZACIJA SENCE (Ključno za vidnost na Zemlji)
        // Shadow Camera mora biti majhna, da pokrije samo Zemljo in Luno, ne celega vesolja
        const d = 10; // Zmanjšano iz 20 na 10 za večjo ostrino na Zemlji (radius 3)
        sunLight.shadow.camera.left = -d; sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d; sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 80;  // Sonce je na -100, Luna na -15. Near mora biti pred Luno.
        sunLight.shadow.camera.far = 120;  // Far mora biti za Zemljo.
        sunLight.shadow.bias = -0.0005;    // Prepreči "shadow acne"
        sunLight.shadow.mapSize.set(4096, 4096); // 4K tekstura za senco
        scene.add(sunLight);

        // Šibka ambientna svetloba, da je senca res temna
        const ambientLight = new THREE.AmbientLight(0x404040, 0.05); 
        scene.add(ambientLight);

        // Vizualni mesh za Sonce
        const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
        sunMesh.position.set(-80, 0, 0);
        scene.add(sunMesh);

        // 2. ZEMLJA (Radius 3)
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);
        const earth = new THREE.Mesh(
            new THREE.SphereGeometry(3, 64, 64), 
            new THREE.MeshPhongMaterial({ 
                color: 0x2233ff, 
                shininess: 5, 
                emissive: 0x000011 // Zelo temna emisija, da se senca pozna
            })
        );
        earth.castShadow = true; 
        earth.receiveShadow = true; // NUJNO: Zemlja prejema senco!
        earthGroup.add(earth);

        // 3. LUNA SISTEM
        const precessionGroup = new THREE.Group();
        earthGroup.add(precessionGroup);
        const tiltGroup = new THREE.Group();
        precessionGroup.add(tiltGroup);

        const moonOrbitRadius = 15;
        const orbitCurve = new THREE.EllipseCurve(0, 0, moonOrbitRadius, moonOrbitRadius, 0, 2 * Math.PI);
        const orbitPoints = orbitCurve.getPoints(128);
        const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
        orbitGeo.rotateX(Math.PI / 2); 
        const orbitMat = new THREE.LineBasicMaterial({ color: 0xffaa00 });
        const orbitLine = new THREE.Line(orbitGeo, orbitMat);
        tiltGroup.add(orbitLine);

        const moonGeo = new THREE.SphereGeometry(0.8, 32, 32); // Radius 0.8
        const moonMat = new THREE.MeshPhongMaterial({ color: 0xdddddd });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        moon.castShadow = true; // Luna meče senco!
        moon.receiveShadow = true;
        tiltGroup.add(moon);

        // --- UI & LOGIKA ---
        const tiltCheck = document.getElementById('tiltCheck');
        const autoPauseCheck = document.getElementById('autoPauseCheck');
        const btnPause = document.getElementById('btnPause');
        const statusDiv = document.getElementById('eclipseStatus');
        const timerBar = document.getElementById('timerBar');
        
        let moonAngle = 0;
        const moonSpeed = 0.01; 
        
        let isManualPaused = false;
        let isEventPaused = false;   
        let hasPausedForThisEvent = false;

        function updateTilt() {
            if (tiltCheck.checked) {
                tiltGroup.rotation.z = 0.35; 
                orbitMat.color.setHex(0xffaa00); 
            } else {
                tiltGroup.rotation.z = 0; 
                orbitMat.color.setHex(0x888888); 
            }
        }
        tiltCheck.addEventListener('change', updateTilt);
        updateTilt();

        btnPause.addEventListener('click', () => {
            isManualPaused = !isManualPaused;
            if(isManualPaused) {
                btnPause.innerText = "▶ PREDVAJAJ";
                btnPause.classList.add("paused");
            } else {
                btnPause.innerText = "⏸ PAVZA";
                btnPause.classList.remove("paused");
            }
        });

        document.getElementById('btnTop').addEventListener('click', () => { controls.reset(); camera.position.set(0, 50, 0); camera.lookAt(0,0,0); });
        document.getElementById('btnSide').addEventListener('click', () => { controls.reset(); camera.position.set(0, 0, 50); camera.lookAt(0,0,0); });
        document.getElementById('btnEarth').addEventListener('click', () => { controls.reset(); camera.position.set(10, 2, 0); camera.lookAt(-50,0,0); });

        // --- NOVA DETEKCIJA: GEOMETRIJSKA RAZDALJA OD OSI ---
        function checkEclipse() {
            const moonPos = new THREE.Vector3();
            moon.getWorldPosition(moonPos);
            
            // Os mrkov je X os (med Soncem -100 in Zemljo 0).
            // Zanima nas odstopanje Lune od te osi (kombinacija Y in Z).
            // distanceToAxis = sqrt(y*y + z*z)
            const distToAxis = Math.sqrt(moonPos.y * moonPos.y + moonPos.z * moonPos.z);
            
            // Kje je Luna na X osi?
            // Če je x > 0, je "za" Zemljo (Lunin mrk).
            // Če je x < 0, je "pred" Zemljo (Sončev mrk).
            
            let status = "";
            let color = "#cbd5e1";
            let triggerPause = false;

            // Reset luna
            moonMat.color.setHex(0xdddddd);
            moonMat.emissive.setHex(0x000000);

            // PRAGOVI (Zemlja R=3.0, Luna R=0.8)
            const earthR = 3.0;
            const moonR = 0.8;
            
            // 1. SONČEV MRK (Luna je med Soncem in Zemljo -> X je negativen)
            if (moonPos.x < -1.0) {
                // Ali senca pade na Zemljo? 
                // Če je distToAxis < earthR, potem središče sence pade na Zemljo?
                // Ne čisto, senca je ožja od Zemlje.
                // Ampak za vizualizacijo:
                
                if (distToAxis < 2.5) { // Ožji prag za POPOLNI (središčni) zadetek
                    status = "SONČEV MRK! (Glej senco na Zemlji!)";
                    color = "#fbbf24"; // Rumena
                    triggerPause = true; // TUKAJ PAVZIRAMO
                } else if (distToAxis < earthR + 0.5) {
                    // Penumbra / Delni (dotika se roba)
                    status = "DELNI SONČEV MRK";
                    color = "#fef08a"; 
                    // Tu NE pavziramo, naj teče, dokler ni "full"
                } else {
                    status = "MLAJ (Ni mrka)";
                }
            } 
            // 2. LUNIN MRK (Luna je za Zemljo -> X je pozitiven)
            else if (moonPos.x > 1.0) {
                if (distToAxis < 2.0) { // Popolni (globoko v senci)
                    status = "POPOLNI LUNIN MRK!";
                    color = "#ef4444"; 
                    moonMat.color.setHex(0x330000); moonMat.emissive.setHex(0x110000);
                    triggerPause = true;
                } else if (distToAxis < earthR + moonR) {
                    status = "DELNI LUNIN MRK";
                    color = "#fca5a5";
                    moonMat.color.setHex(0x664444);
                } else {
                    status = "POLNA LUNA (Ni mrka)";
                }
            }

            // Izpis
            if (status !== "") {
                statusDiv.childNodes[0].nodeValue = status;
                statusDiv.style.color = color;
            } else {
                statusDiv.childNodes[0].nodeValue = " ";
            }

            // --- AUTO-PAVZA LOGIKA ---
            if (triggerPause) {
                if (autoPauseCheck.checked && !hasPausedForThisEvent && !isManualPaused && !isEventPaused) {
                    isEventPaused = true;
                    hasPausedForThisEvent = true;
                    startEventTimer();
                }
            } else {
                // Reset flag ko smo daleč stran (distToAxis > 4.5)
                if (distToAxis > 4.5) {
                    hasPausedForThisEvent = false;
                }
            }
        }

        function startEventTimer() {
            let timeLeft = 5000; 
            const interval = 50; 
            
            timerBar.style.width = "100%";
            timerBar.style.transition = "width 5s linear";
            setTimeout(() => { timerBar.style.width = "0%"; }, 10);

            const timerId = setInterval(() => {
                if (!isManualPaused) { 
                    timeLeft -= interval;
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    isEventPaused = false;
                }
            }, interval);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isManualPaused && !isEventPaused) {
                moonAngle -= moonSpeed; 
                moon.position.x = Math.cos(moonAngle) * moonOrbitRadius;
                moon.position.z = Math.sin(moonAngle) * moonOrbitRadius;

                if (tiltCheck.checked) {
                    precessionGroup.rotation.y += 0.003; // Malo hitreje za demo
                } else {
                    precessionGroup.rotation.y = 0; 
                }

                earth.rotation.y += 0.005;
            }

            checkEclipse();
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
