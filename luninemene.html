<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Sistem Sonce-Zemlja-Luna</title>
    <style>
        /* --- BASE STYLES --- */
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            /* Nežno ozadje vesolja */
            background: radial-gradient(circle at center, #1e293b 0%, #020617 80%);
            width: 100%;
            height: 100%;
        }

        /* --- UI OVERLAYS --- */
        .header {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0; color: #38bdf8; font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .subtitle { color: #94a3b8; font-size: 0.95rem; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; }

        /* --- CONTROLS --- */
        .controls {
            position: absolute;
            bottom: 30px;
            background: rgba(15, 23, 42, 0.9);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid #334155;
            display: flex;
            gap: 25px;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 20;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 140px;
            align-items: center;
        }

        label { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; font-weight: bold; letter-spacing: 1px; }
        
        /* Custom Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            background: #38bdf8;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* Toggle Button */
        .toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 20px;
            background: #1e293b;
            border-radius: 20px;
            border: 1px solid #334155;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: #cbd5e1;
            font-weight: bold;
        }
        .toggle-btn:hover { background: #334155; transform: translateY(-2px); }
        .toggle-btn.active {
            background: #0ea5e9;
            color: white;
            border-color: #0ea5e9;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
        }

    </style>
</head>
<body>

<div class="header">
    <h1>Sistem Sonce-Zemlja-Luna</h1>
    <div class="subtitle">Opazuj ples Lune in Zemlje okoli Sonca. Pazi na zastavico na Luni!</div>
</div>

<canvas id="simCanvas"></canvas>

<div class="controls">
    <div class="control-group">
        <label>Hitrost Simulacije</label>
        <input type="range" id="speedInput" min="0" max="2" step="0.1" value="0.5">
    </div>

    <div style="width: 1px; height: 40px; background: #475569;"></div>

    <div class="toggle-btn" id="btnTrail" onclick="toggleTrail()">
        <span>〰️</span> Riši Sled (Trail)
    </div>
</div>

<script>
// --- CONFIGURATION ---
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const speedInput = document.getElementById('speedInput');
const btnTrail = document.getElementById('btnTrail');

// Parametri simulacije
const earthOrbitR = 280; // Radij tirnice Zemlje okoli centra
const moonOrbitR = 50;   // Radij tirnice Lune okoli Zemlje

// Hitrosti (Relativna razmerja)
// Leto = 1 krog. 
// Mesec = cca 12 krogov na leto.
// Dan = 365 obratov na leto.
const baseSpeed = 0.005; // Osnovna hitrost leta

let state = {
    angleYear: 0,   // Kje je Zemlja okoli Sonca
    angleMonth: 0,  // Kje je Luna okoli Zemlje
    angleDay: 0,    // Vrtenje Zemlje okoli osi
    showTrail: false,
    trailEarth: [],
    trailMoon: []
};

// --- INITIAL RESIZE ---
let center = { x: 0, y: 0 };
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    center.x = canvas.width / 2;
    center.y = canvas.height / 2;
}
window.addEventListener('resize', resize);
resize();

// --- MAIN LOOP ---
function update() {
    // 1. Branje hitrosti
    const speedMult = parseFloat(speedInput.value);

    if (speedMult > 0) {
        // --- POPRAVEK SMERI VRTENJA (V LEVO / COUNTER-CLOCKWISE) ---
        
        // Premik Zemlje okoli Sonca (Leto) - Zamenjano += v -=
        state.angleYear -= baseSpeed * speedMult;
        
        // Premik Lune okoli Zemlje (Mesec) - Zamenjano += v -=
        state.angleMonth -= (baseSpeed * 13) * speedMult;
        
        // Vrtenje Zemlje (Dan) - Zamenjano += v -=
        state.angleDay -= (baseSpeed * 100) * speedMult; 
    }

    // 2. Izračun Pozicij
    // Zemlja
    const earthX = center.x + Math.cos(state.angleYear) * earthOrbitR;
    const earthY = center.y + Math.sin(state.angleYear) * earthOrbitR;

    // Luna (relativno na Zemljo)
    const moonX = earthX + Math.cos(state.angleMonth) * moonOrbitR;
    const moonY = earthY + Math.sin(state.angleMonth) * moonOrbitR;

    // 3. Trail Logic
    if (state.showTrail && speedMult > 0) {
        // Dodamo točke vsakih nekaj frameov
        if (Math.random() > 0.5) { // Optimizacija, ne vsak frame
            state.trailEarth.push({x: earthX, y: earthY});
            state.trailMoon.push({x: moonX, y: moonY});
            
            // Omejimo dolžino sledi
            if (state.trailEarth.length > 300) state.trailEarth.shift();
            if (state.trailMoon.length > 300) state.trailMoon.shift();
        }
    } else if (!state.showTrail) {
        state.trailEarth = [];
        state.trailMoon = [];
    }

    draw(earthX, earthY, moonX, moonY);
    requestAnimationFrame(update);
}

function draw(earthX, earthY, moonX, moonY) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // --- 1. SLEDI (TRAILS) ---
    if (state.showTrail) {
        // Sled Lune
        ctx.beginPath();
        if (state.trailMoon.length > 0) ctx.moveTo(state.trailMoon[0].x, state.trailMoon[0].y);
        state.trailMoon.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = "rgba(148, 163, 184, 0.4)"; // Siva
        ctx.lineWidth = 2;
        ctx.stroke();

        // Sled Zemlje
        ctx.beginPath();
        if (state.trailEarth.length > 0) ctx.moveTo(state.trailEarth[0].x, state.trailEarth[0].y);
        state.trailEarth.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = "rgba(56, 189, 248, 0.3)"; // Modra
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    // --- 2. ORBITA ZEMLJE (Referenčni krog) ---
    ctx.beginPath();
    ctx.arc(center.x, center.y, earthOrbitR, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
    ctx.lineWidth = 1;
    ctx.setLineDash([10, 10]);
    ctx.stroke();
    ctx.setLineDash([]);

    // --- 3. CENTRALNI OKVIR (SONCE) ---
    const boxSize = 140;
    const boxX = center.x - boxSize/2;
    const boxY = center.y - boxSize/2;

    // Okvir
    ctx.strokeStyle = "#64748b"; 
    ctx.lineWidth = 2;
    ctx.strokeRect(boxX, boxY, boxSize, boxSize);

    // Sonce (Zoomed in)
    ctx.save();
    ctx.beginPath();
    ctx.rect(boxX, boxY, boxSize, boxSize);
    ctx.clip(); // Rišemo samo znotraj kvadrata

    // Velika žareča krogla
    ctx.beginPath();
    ctx.arc(center.x, center.y, boxSize * 0.8, 0, Math.PI*2);
    const sunGrad = ctx.createRadialGradient(center.x, center.y, 10, center.x, center.y, boxSize*0.8);
    sunGrad.addColorStop(0, "#fff");
    sunGrad.addColorStop(0.3, "#fbbf24");
    sunGrad.addColorStop(1, "#f59e0b");
    ctx.fillStyle = sunGrad;
    ctx.fill();

    // Napis
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.font = "bold 12px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("SONCE", center.x, center.y + 10);
    ctx.font = "10px sans-serif";
    ctx.fillText("(POVEČANO, ZOOM)", center.x, center.y + 22);

    ctx.restore();

    // --- 4. ZEMLJA ---
    const rEarth = 25;
    
    ctx.save();
    ctx.translate(earthX, earthY);
    
    // a) Vrtenje Zemlje (Rotacija kontinentov)
    ctx.save();
    ctx.rotate(state.angleDay); // Hitro vrtenje
    
    // Telo
    ctx.beginPath(); ctx.arc(0, 0, rEarth, 0, Math.PI*2);
    ctx.fillStyle = "#2563eb"; // Ocean
    ctx.fill();
    
    // Kontinenti (Preprosti liki)
    ctx.fillStyle = "#10b981"; // Zelena
    ctx.beginPath(); ctx.arc(10, 5, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-8, -10, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.rect(-15, 5, 10, 10); ctx.fill();
    ctx.restore();

    // b) Osvetlitev (Senca)
    // Senca je vedno na nasprotni strani od Sonca (centra)
    // Kot do Sonca je atan2(earthY - cy, earthX - cx).
    // Ampak mi smo že v lokalnem sistemu. Sonce je na (-earthX, -earthY) glede na nas?
    // Ne, najlažje: Kot do centra je (state.angleYear + PI).
    
    // Rotiramo kontekst tako, da X os kaže stran od Sonca
    ctx.rotate(state.angleYear); 
    
    // Polovica v senci
    ctx.beginPath();
    ctx.arc(0, 0, rEarth, -Math.PI/2, Math.PI/2); // Desna polovica v lokalnem rotiranem sistemu
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fill();
    
    ctx.restore();

    // --- 5. LUNA ---
    const rMoon = 10;
    
    ctx.save();
    ctx.translate(moonX, moonY);

    // a) SINHRONA ROTACIJA (Zastavica proti Zemlji)
    // Luna mora biti obrnjena proti Zemlji.
    // Kot od Lune do Zemlje je (state.angleMonth + PI).
    ctx.save();
    ctx.rotate(state.angleMonth + Math.PI); // Pazi, tole rotira celo luno

    // Telo Lune
    ctx.beginPath(); ctx.arc(0, 0, rMoon, 0, Math.PI*2);
    ctx.fillStyle = "#94a3b8"; // Siva
    ctx.fill();
    
    // Kraterji (za občutek rotacije)
    ctx.fillStyle = "#64748b";
    ctx.beginPath(); ctx.arc(4, -3, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-2, 5, 1.5, 0, Math.PI*2); ctx.fill();

    // ZASTAVICA 🚩
    // Mora kazati proti Zemlji. Ker smo rotirali kontekst proti Zemlji,
    // mora zastavica kazati v desno (0 stopinj) ali v center?
    // Rotacija (angleMonth + PI) pomeni, da lokalna X os kaže PROTI Zemlji.
    
    // Palica
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(18, 0); 
    ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 1; ctx.stroke();
    
    // Zastava
    ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(26, -5); ctx.lineTo(26, 5); ctx.closePath();
    ctx.fillStyle = "#ef4444"; ctx.fill(); // Rdeča

    ctx.restore();

    // b) Osvetlitev Lune (Faze)
    // Senca je odvisna od Sonca (Centra), ne od Zemlje!
    // Kot do Sonca = kot pozicije Lune okoli centra.
    // To je približno angleYear (ker je Luna blizu Zemlje).
    // Za natančnost: atan2(moonY - center.y, moonX - center.x)
    const angleToSun = Math.atan2(moonY - center.y, moonX - center.x);
    
    ctx.rotate(angleToSun);
    
    // Polovica v senci (stran od sonca)
    ctx.beginPath();
    // Narišemo polkrog sence
    ctx.arc(0, 0, rMoon, -Math.PI/2, Math.PI/2);
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fill();

    ctx.restore();
}

// UI Handlers
function toggleTrail() {
    state.showTrail = !state.showTrail;
    btnTrail.classList.toggle('active');
    state.trailEarth = [];
    state.trailMoon = [];
}

// Start
update();

</script>
</body>
</html>
