<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Lunine Mene - View From Surface</title>
    <style>
        /* --- BASE STYLE --- */
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            text-align: center;
            padding: 15px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.95);
            width: 100%;
            border-bottom: 1px solid #334155;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; color: #38bdf8; font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }

        /* --- SPLIT CONTAINER --- */
        .split-container {
            display: flex;
            flex: 1;
            width: 100%;
            position: relative;
        }

        .view-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-right: 1px solid #334155;
        }
        .view-panel:last-child { border-right: none; }

        .panel-label {
            position: absolute;
            top: 20px;
            right: 20px; 
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #38bdf8;
            border-right: 4px solid #38bdf8;
            pointer-events: none;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* LEVO OZADJE (Vesolje) */
        #orbitCanvas { background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); }
        /* DESNO OZADJE (Nebo) */
        #phaseCanvas { background: radial-gradient(circle at bottom, #0f172a 0%, #000 100%); }

        /* --- CONTROLS --- */
        .controls {
            background: #1e293b;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border-top: 1px solid #334155;
            z-index: 10;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 250px;
        }

        label { font-size: 0.85rem; text-transform: uppercase; color: #64748b; font-weight: bold; letter-spacing: 1px; }
        .val-display { font-size: 1.3rem; font-weight: bold; color: white; margin-bottom: 5px; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px; height: 24px;
            background: #38bdf8;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }

        .phase-name {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 800;
            color: #fbbf24;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            pointer-events: none;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
        }
        
        button#playBtn {
            padding: 12px 30px;
            background: #38bdf8;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            color: #0f172a;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        button#playBtn:hover { transform: scale(1.05); background: #7dd3fc; }

    </style>
</head>
<body>

<div class="header">
    <h1>Lunine Mene</h1>
    <div class="subtitle">Opazuj, kako se spreminja videz Lune glede na njen položaj v orbiti</div>
</div>

<div class="split-container">
    <div class="view-panel">
        <div class="panel-label">POGLED IZ VESOLJA</div>
        <canvas id="orbitCanvas"></canvas>
    </div>

    <div class="view-panel">
        <div class="panel-label">POGLED Z ZEMLJE</div>
        <div class="phase-name" id="phaseName">MLAJ</div>
        <canvas id="phaseCanvas"></canvas>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>Položaj Lune (Dan)</label>
        <div class="val-display" id="dayVal">Dan 0.0</div>
        <input type="range" id="moonSlider" min="0" max="29.5" step="0.01" value="0">
    </div>
    
    <div class="control-group">
        <label>Kontrola</label>
        <button id="playBtn">▶ PREDVAJAJ</button>
    </div>
</div>

<script>
const orbitCanvas = document.getElementById('orbitCanvas');
const phaseCanvas = document.getElementById('phaseCanvas');
const ctxO = orbitCanvas.getContext('2d');
const ctxP = phaseCanvas.getContext('2d');

const moonSlider = document.getElementById('moonSlider');
const dayVal = document.getElementById('dayVal');
const phaseName = document.getElementById('phaseName');
const playBtn = document.getElementById('playBtn');

let currentDay = 0; 
let isPlaying = false;

// Config
const earthR = 65;   
const moonR = 20;    
const orbitR = 220;  

function resize() {
    const container = document.querySelector('.split-container');
    const w = container.clientWidth / 2;
    const h = container.clientHeight;
    
    orbitCanvas.width = w; 
    orbitCanvas.height = h;
    phaseCanvas.width = w; 
    phaseCanvas.height = h;
}
window.addEventListener('resize', resize);
setTimeout(resize, 100);

function getPhaseName(day) {
    if(day < 1 || day > 28.5) return "MLAJ";
    if(day >= 1 && day < 6.5) return "RASTOČI SRP";
    if(day >= 6.5 && day < 8.5) return "PRVI KRAJEC";
    if(day >= 8.5 && day < 14) return "RASTOČA LUNA";
    if(day >= 14 && day < 15.5) return "POLNA LUNA (ŠČIP)";
    if(day >= 15.5 && day < 21) return "UPADAJOČA LUNA";
    if(day >= 21 && day < 23) return "ZADNJI KRAJEC";
    return "UPADAJOČI SRP";
}

function update() {
    if(isPlaying) {
        currentDay += 0.02;
        if (currentDay > 29.5) currentDay = 0;
        moonSlider.value = currentDay;
    } else {
        currentDay = parseFloat(moonSlider.value);
    }

    dayVal.innerText = "Dan " + currentDay.toFixed(1);
    phaseName.innerText = getPhaseName(currentDay);

    drawOrbit();
    drawPhase();
    requestAnimationFrame(update);
}

// 1. POGLED IZ VESOLJA
function drawOrbit() {
    const w = orbitCanvas.width;
    const h = orbitCanvas.height;
    const cx = w/2 + 30; 
    const cy = h/2;

    ctxO.clearRect(0,0,w,h);

    // --- SONČNI ŽARKI ---
    ctxO.beginPath();
    for(let y = cy - 150; y < cy + 150; y += 25) {
        ctxO.moveTo(0, y);
        ctxO.lineTo(80, y); 
    }
    ctxO.strokeStyle = "#fbbf24"; 
    ctxO.lineWidth = 3;
    ctxO.stroke();

    ctxO.fillStyle = "#fbbf24";
    ctxO.font = "bold 16px 'Segoe UI', sans-serif";
    ctxO.textAlign = "left";
    ctxO.fillText("SONČNI ŽARKI", 10, cy - 160); 

    // --- ORBITA ---
    ctxO.beginPath();
    ctxO.arc(cx, cy, orbitR, 0, Math.PI*2);
    ctxO.strokeStyle = "rgba(255, 255, 255, 0.15)";
    ctxO.lineWidth = 2;
    ctxO.setLineDash([8, 8]);
    ctxO.stroke();
    ctxO.setLineDash([]);

    // --- ZEMLJA ---
    ctxO.beginPath(); ctxO.arc(cx, cy, earthR, 0, Math.PI*2);
    ctxO.fillStyle = "#0f172a"; ctxO.fill(); 

    ctxO.beginPath(); ctxO.arc(cx, cy, earthR, -Math.PI/2, Math.PI/2, true);
    ctxO.fillStyle = "#2277ff"; ctxO.fill();
    
    ctxO.beginPath(); ctxO.arc(cx, cy, earthR, -Math.PI/2, Math.PI/2, true);
    ctxO.strokeStyle = "#60a5fa"; ctxO.lineWidth = 2; ctxO.stroke();

    // --- LUNA ---
    const angle = Math.PI - (currentDay / 29.5) * Math.PI * 2;
    const mx = cx + Math.cos(angle) * orbitR;
    const my = cy + Math.sin(angle) * orbitR;

    ctxO.beginPath(); ctxO.arc(mx, my, moonR, 0, Math.PI*2);
    ctxO.fillStyle = "#1e293b"; ctxO.fill(); 
    
    ctxO.beginPath(); ctxO.arc(mx, my, moonR, -Math.PI/2, Math.PI/2, true);
    ctxO.fillStyle = "#e2e8f0"; ctxO.fill();

    // --- ČRTA POGLEDA (IZ POVRŠJA ZEMLJE) ---
    // 1. Izračunamo točko na površju zemlje, ki gleda proti Luni
    // To je enostavno: ista logika kot za pozicijo lune, ampak krajši radij (earthR)
    const surfaceX = cx + Math.cos(angle) * earthR;
    const surfaceY = cy + Math.sin(angle) * earthR;

    // Narišemo črto od površja do lune
    ctxO.beginPath(); 
    ctxO.moveTo(surfaceX, surfaceY); 
    ctxO.lineTo(mx, my);
    ctxO.strokeStyle = "rgba(74, 222, 128, 0.6)"; // Svetlo zelena, da se loči
    ctxO.lineWidth = 2;
    ctxO.setLineDash([4, 4]); // Črtkana za "pogled"
    ctxO.stroke();
    ctxO.setLineDash([]);

    // --- OPAZOVALEC (PIKA NA ZEMLJI) ---
    // Da bo jasno, da nekdo tam stoji
    ctxO.beginPath();
    ctxO.arc(surfaceX, surfaceY, 5, 0, Math.PI*2);
    ctxO.fillStyle = "#4ade80"; // Zelena pika
    ctxO.shadowBlur = 10;
    ctxO.shadowColor = "#4ade80";
    ctxO.fill();
    ctxO.shadowBlur = 0;
}

// 2. POGLED Z ZEMLJE
function drawPhase() {
    const w = phaseCanvas.width;
    const h = phaseCanvas.height;
    const cx = w/2;
    const cy = h/2;
    const R = 100; 

    ctxP.clearRect(0,0,w,h);

    ctxP.beginPath(); ctxP.arc(cx, cy, R, 0, Math.PI*2);
    ctxP.fillStyle = "#0f172a"; ctxP.fill(); 

    const isWaxing = currentDay < 14.7; 
    
    ctxP.beginPath();
    ctxP.arc(cx, cy, R, -Math.PI/2, Math.PI/2, !isWaxing);
    ctxP.fillStyle = "#e2e8f0"; ctxP.fill();

    const phaseAngle = (currentDay / 29.5) * 2 * Math.PI;
    const ellWidth = Math.abs(Math.cos(phaseAngle) * R);
    
    ctxP.beginPath();
    ctxP.ellipse(cx, cy, ellWidth, R, 0, 0, Math.PI*2);
    
    if (currentDay < 7.4) ctxP.fillStyle = "#0f172a"; 
    else if (currentDay < 14.7) ctxP.fillStyle = "#e2e8f0"; 
    else if (currentDay < 22.1) ctxP.fillStyle = "#e2e8f0"; 
    else ctxP.fillStyle = "#0f172a"; 
    
    ctxP.fill();
    
    if (currentDay > 13.5 && currentDay < 16) {
        ctxP.shadowBlur = 50;
        ctxP.shadowColor = "rgba(255, 255, 255, 0.5)";
        ctxP.beginPath(); ctxP.arc(cx, cy, R, 0, Math.PI*2);
        ctxP.fillStyle = "rgba(255,255,255,0.01)"; ctxP.fill();
        ctxP.shadowBlur = 0;
    }
}

moonSlider.addEventListener('input', () => {
    isPlaying = false;
    playBtn.innerText = "▶ PREDVAJAJ";
    playBtn.style.background = "#38bdf8";
});

playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    if(isPlaying) {
        playBtn.innerText = "⏸ PAVZA";
        playBtn.style.background = "#fbbf24"; 
        playBtn.style.color = "#000";
    } else {
        playBtn.innerText = "▶ PREDVAJAJ";
        playBtn.style.background = "#38bdf8";
        playBtn.style.color = "#0f172a";
    }
});

update();
</script>
</body>
</html>
