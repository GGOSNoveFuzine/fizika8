<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Osončje - Galaxy Edition</title>
    <style>
        /* --- BASE STYLES --- */
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh;
        }

        canvas { 
            display: block; 
            background: radial-gradient(circle at center, #0b1026 0%, #000000 80%); 
        }

        /* --- BIG INSTRUCTION LABEL --- */
        .instruction-label {
            position: absolute;
            bottom: 100px; 
            font-size: 1.5em;
            font-weight: bold;
            color: #44aaff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
            pointer-events: none; 
            animation: pulse 3s infinite ease-in-out;
            text-align: center;
            width: 100%;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        /* --- HUD PANEL (Info kartica) --- */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px; /* Mal širše, da gre ves tekst not */
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #334155;
            border-left: 5px solid #00d4ff; 
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: opacity 0.2s, transform 0.2s;
            opacity: 0; 
            transform: translateX(30px);
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel.active {
            opacity: 1;
            transform: translateX(0);
        }

        .hud-title {
            font-size: 2em;
            font-weight: 900;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            color: #00d4ff;
            letter-spacing: 1px;
        }

        .hud-stat {
            font-size: 0.95em;
            color: #94a3b8;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 4px;
        }
        
        .hud-stat span { color: white; font-weight: bold; text-align: right; }

        .hud-desc {
            margin-top: 15px;
            font-size: 0.9em;
            color: #cbd5e1;
            line-height: 1.5;
            font-style: italic;
            border-top: 1px solid #334155;
            padding-top: 10px;
        }

        /* --- CONTROLS --- */
        .controls {
            position: absolute;
            bottom: 30px;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #333;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 10;
        }

        label { font-size: 0.9em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { accent-color: #00d4ff; cursor: pointer; width: 150px; }

    </style>
</head>
<body>

<div class="instruction-label">Za več info pojdi z miško na planet (ali Sonce) ☀️</div>

<div class="hud-panel" id="infoPanel">
    <div class="hud-title" id="pName">PLANET</div>
    
    <div class="hud-stat">Hitrost: <span id="pSpeed">-</span></div>
    <div class="hud-stat">Obhodni čas: <span id="pPeriod">-</span></div> 
    <div class="hud-stat">Polmer: <span id="pRadius">-</span></div> 
    <div class="hud-stat">Sateliti/Lune: <span id="pMoons">-</span></div>
    
    <div class="hud-desc" id="pDesc">Opis...</div>
</div>

<canvas id="solarCanvas"></canvas>

<div class="controls">
    <label>Time Speed</label>
    <input type="range" id="speedRange" min="0" max="5" step="0.1" value="1">
</div>

<script>
// --- ELEMENTI ---
const canvas = document.getElementById('solarCanvas');
const ctx = canvas.getContext('2d');
const infoPanel = document.getElementById('infoPanel');

// Reference HUD elementov
const pName = document.getElementById('pName');
const pSpeed = document.getElementById('pSpeed');
const pPeriod = document.getElementById('pPeriod'); 
const pRadius = document.getElementById('pRadius'); 
const pMoons = document.getElementById('pMoons');
const pDesc = document.getElementById('pDesc');
const speedRange = document.getElementById('speedRange');

// Setup
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const center = { x: canvas.width / 2, y: canvas.height / 2 };

// State
let globalSpeed = 1;
let hoveredObject = null;
let stars = [];

// --- DATA: SONCE ---
const sunData = {
    id: "sun",
    name: "Sonce",
    color: "#ffcc00",
    r: 35, 
    realSpeed: "220 km/s", 
    // TUKAJ JE SPREMEMBA: Dodal sem "okoli galaksije"
    period: "230 mio let (okoli galaksije)", 
    radiusStr: "696.340 km",
    moons: "8 planetov", 
    desc: "Zvezda tipa G2V. Glavni vir energije za vse nas. Brez njega bi zmrznili v temi. Površinska temperatura: 5500°C."
};

// --- DATA: PLANETI ---
const planets = [
    { 
        id: "mercury", name: "Merkur", color: "#A5A5A5", 
        r: 6, dist: 60, speed: 0.04, angle: Math.random() * 6,
        moons: 0, 
        realSpeed: "47.9 km/s", period: "88 dni", radiusStr: "2.440 km",
        desc: "Najmanjši in Soncu najbližji planet. Nima atmosfere, zato ga meteoriti rešetajo kot švicarski sir." 
    },
    { 
        id: "venus", name: "Venera", color: "#FFC649", 
        r: 10, dist: 90, speed: 0.025, angle: Math.random() * 6,
        moons: 0, 
        realSpeed: "35.0 km/s", period: "225 dni", radiusStr: "6.052 km",
        desc: "Peklenski planet. Zaradi tople grede je bolj vroč kot Merkur, čeprav je dlje stran." 
    },
    { 
        id: "earth", name: "Zemlja", color: "#2277ff", 
        r: 11, dist: 130, speed: 0.02, angle: Math.random() * 6,
        moons: 1, 
        realSpeed: "29.8 km/s", period: "365 dni", radiusStr: "6.371 km",
        desc: "Naš HQ. Edini planet s tekočo vodo, kisikom in YouTubom." 
    },
    { 
        id: "mars", name: "Mars", color: "#ff4422", 
        r: 8, dist: 170, speed: 0.016, angle: Math.random() * 6,
        moons: 2, 
        realSpeed: "24.1 km/s", period: "687 dni", radiusStr: "3.390 km",
        desc: "Rdeči planet. Elon Musk že pakira kovčke. Ima največji vulkan v osončju." 
    },
    { 
        id: "jupiter", name: "Jupiter", color: "#d4a373", 
        r: 28, dist: 280, speed: 0.008, angle: Math.random() * 6,
        moons: 95, 
        realSpeed: "13.1 km/s", period: "11,9 let", radiusStr: "69.911 km",
        desc: "Big Boss. Plinski velikan, ki nas s svojo gravitacijo ščiti pred kometi." 
    },
    { 
        id: "saturn", name: "Saturn", color: "#ead185", 
        r: 24, dist: 380, speed: 0.006, angle: Math.random() * 6,
        moons: 146, 
        realSpeed: "9.7 km/s", period: "29,5 let", radiusStr: "58.232 km",
        desc: "Lord of the Rings. Prstani so iz ledu in skal. Ima največ lun v soseski." 
    },
    { 
        id: "uranus", name: "Uran", color: "#ace5ee", 
        r: 18, dist: 460, speed: 0.004, angle: Math.random() * 6,
        moons: 27, 
        realSpeed: "6.8 km/s", period: "84 let", radiusStr: "25.362 km",
        desc: "Ledeni velikan, ki se kotali po orbiti, ker je nagnjen za 98 stopinj." 
    },
    { 
        id: "neptune", name: "Neptun", color: "#3f54ba", 
        r: 17, dist: 540, speed: 0.003, angle: Math.random() * 6,
        moons: 14, 
        realSpeed: "5.4 km/s", period: "165 let", radiusStr: "24.622 km",
        desc: "The chill guy. Najbolj oddaljen, temen in mrzel. Vetrovi pihajo 2000 km/h." 
    }
];

// --- ASTEROIDS ---
const asteroids = [];
for(let i=0; i<300; i++) {
    const dist = 200 + Math.random() * 50; 
    const angle = Math.random() * Math.PI * 2;
    asteroids.push({ dist, angle, size: Math.random() * 1.5 + 0.5, speed: 0.012 - (Math.random()*0.002) });
}

// --- STARS ---
for(let i=0; i<400; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.5,
        alpha: Math.random()
    });
}

// --- GAME LOOP ---

function update() {
    globalSpeed = parseFloat(speedRange.value);

    // Freeze time on hover
    const timeMult = hoveredObject ? 0 : globalSpeed;

    planets.forEach(p => { p.angle -= p.speed * timeMult; });
    asteroids.forEach(a => { a.angle -= a.speed * timeMult; });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Zvezde
    ctx.fillStyle = "white";
    stars.forEach(s => {
        ctx.globalAlpha = s.alpha;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    // 2. SONCE
    const isSunHovered = (hoveredObject === sunData);
    
    ctx.beginPath();
    ctx.arc(center.x, center.y, sunData.r, 0, Math.PI * 2);
    ctx.fillStyle = sunData.color;
    
    if (isSunHovered) {
        ctx.shadowBlur = 100; // HUGE glow
        ctx.shadowColor = "#ffaa00";
    } else {
        ctx.shadowBlur = 60; 
        ctx.shadowColor = "#ffaa00";
    }
    
    ctx.fill(); 
    ctx.shadowBlur = 0; 

    // 3. Orbite
    ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
    ctx.lineWidth = 1;
    planets.forEach(p => {
        ctx.beginPath(); ctx.arc(center.x, center.y, p.dist, 0, Math.PI * 2); ctx.stroke();
    });

    // 4. Asteroidi
    ctx.fillStyle = "#666";
    asteroids.forEach(a => {
        const ax = center.x + Math.cos(a.angle) * a.dist;
        const ay = center.y + Math.sin(a.angle) * a.dist;
        ctx.beginPath(); ctx.arc(ax, ay, a.size, 0, Math.PI*2); ctx.fill();
    });

    // 5. Planeti
    planets.forEach(p => {
        const x = center.x + Math.cos(p.angle) * p.dist;
        const y = center.y + Math.sin(p.angle) * p.dist;
        p.currentX = x; p.currentY = y; 

        if (p.id === "saturn") {
            ctx.beginPath();
            ctx.ellipse(x, y, p.r * 2.2, p.r * 0.6, p.angle + Math.PI/4, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(200, 180, 150, 0.6)"; ctx.lineWidth = 4; ctx.stroke();
        }

        ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        if (hoveredObject === p) { ctx.shadowBlur = 20; ctx.shadowColor = "white"; }
        ctx.fill(); ctx.shadowBlur = 0;

        if (p.moons > 0) {
            const badgeX = x + p.r + 5; const badgeY = y - p.r - 5;
            ctx.beginPath(); ctx.arc(badgeX, badgeY, 6, 0, Math.PI*2);
            ctx.fillStyle = "#333"; ctx.fill();
            ctx.strokeStyle = "#555"; ctx.lineWidth = 1; ctx.stroke();
            ctx.fillStyle = "white"; ctx.font = "bold 8px Arial";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(p.moons, badgeX, badgeY);
        }

        // Labels
        if (hoveredObject === p || p.id === 'jupiter' || p.id === 'saturn') {
            ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.font = "10px sans-serif";
            ctx.textAlign = "center"; ctx.fillText(p.name, x, y + p.r + 15);
        }
    });
}

// --- INTERAKCIJA ---

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    let found = null;

    // 1. Check Collision with SUN
    const distToCenter = Math.sqrt((mx - center.x)**2 + (my - center.y)**2);
    if (distToCenter < sunData.r + 10) {
        found = sunData;
    }

    // 2. Planets
    if (!found) {
        planets.forEach(p => {
            const dx = mx - p.currentX; const dy = my - p.currentY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < p.r + 15) found = p; 
        });
    }

    hoveredObject = found;

    if (found) {
        // Fill HUD Data
        infoPanel.classList.add('active');
        pName.innerText = found.name;
        pSpeed.innerText = found.realSpeed;
        pPeriod.innerText = found.period; 
        pRadius.innerText = found.radiusStr; 
        pMoons.innerText = found.moons;
        pDesc.innerText = found.desc;
        
        infoPanel.style.borderLeftColor = found.color;
        canvas.style.cursor = "pointer";
    } else {
        infoPanel.classList.remove('active');
        canvas.style.cursor = "default";
    }
});

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    center.x = canvas.width / 2;
    center.y = canvas.height / 2;
});

update();

</script>
</body>
</html>
